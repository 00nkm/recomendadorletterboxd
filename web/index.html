<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recomendador Letterboxd - MVP</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        background: #f5f7fb;
        color: #1b2638;
        margin: 0;
        min-height: 100vh;
        padding: 0;
      }
      .page {
        margin: 0 auto;
        max-width: 980px;
        padding: 28px 20px 40px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 2.5vw, 2.6rem);
      }
      p.lead {
        margin: 0 0 24px;
        color: #475569;
        line-height: 1.6;
      }
      .panel {
        background: white;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 18px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
        padding: 24px;
        margin-bottom: 20px;
      }
      .controls {
        display: grid;
        gap: 12px;
      }
      .controls label {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        font-size: 0.95rem;
      }
      .controls input[type=text], .controls input[type=number] {
        flex: 1 1 180px;
        min-width: 160px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 10px 12px;
      }
      .controls button {
        background: #2563eb;
        border: none;
        border-radius: 10px;
        color: white;
        cursor: pointer;
        font-weight: 600;
        padding: 12px 18px;
        transition: background 0.2s ease;
      }
      .controls button:hover {
        background: #1d4ed8;
      }
      .status-panel {
        display: grid;
        gap: 10px;
        margin-top: 20px;
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        background: #eff6ff;
        color: #1d4ed8;
        font-size: 0.95rem;
      }
      .cards {
        display: grid;
        gap: 16px;
      }
      .card {
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 18px;
        background: white;
        overflow: hidden;
        padding: 16px;
      }
      .card h3 {
        margin: 0 0 8px;
        font-size: 1.15rem;
      }
      .meta {
        color: #475569;
        font-size: 0.92rem;
        margin-bottom: 12px;
      }
      .message {
        color: #334155;
        margin-top: 14px;
      }
      @media (min-width: 640px) {
        .controls {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>Recomendador Letterboxd</h1>
      <p class="lead">Informe seu username e sincronize seu histórico. Depois use filtros para refinar as sugestões de filmes.</p>

      <div class="panel">
        <form id="syncForm" class="controls">
          <label>
            Username
            <input id="username" type="text" placeholder="letterboxd username" />
          </label>
          <label>
            <input id="rerank" type="checkbox" /> Re-rank com IA
          </label>
          <button type="submit">Iniciar sincronização</button>
        </form>

        <div id="status" class="status-panel"></div>
      </div>

      <div class="panel">
        <form id="filtersForm" class="controls">
          <label>
            Gênero
            <input id="genre" type="text" placeholder="Ex: Drama" />
          </label>
          <label>
            Min Year
            <input id="minYear" type="number" min="1900" max="2100" placeholder="1900" />
          </label>
          <label>
            Max Year
            <input id="maxYear" type="number" min="1900" max="2100" placeholder="2026" />
          </label>
          <label>
            <input id="onlyUnseen" type="checkbox" checked /> Só não vistos
          </label>
          <button type="submit">Aplicar filtros</button>
        </form>
      </div>

      <div id="recs"></div>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
